<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rtysafe - Verification</title>
    <style>
        :root {
            --bg: #000;
            --accent: #00ff41; /* Neon Green */
            --text: #fff;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            border: 3px solid var(--accent);
            padding: 2rem;
            box-shadow: 8px 8px 0px var(--accent);
            text-align: center;
            max-width: 400px;
            background: #111;
        }
        h1 { font-size: 1.5rem; margin-bottom: 1rem; text-transform: uppercase; }
        .status { margin-bottom: 20px; color: var(--accent); }
        .loader {
            height: 4px;
            width: 100%;
            background: #222;
            position: relative;
            margin-bottom: 20px;
        }
        .progress {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 0.5s linear;
        }
        #captcha-box { display: none; margin-top: 15px; }
        input {
            background: transparent;
            border: 2px solid var(--accent);
            color: var(--accent);
            padding: 8px;
            width: 80px;
            text-align: center;
            outline: none;
        }
        button {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Rtysafe System</h1>
    <div id="status" class="status">Memeriksa keamanan koneksi...</div>
    <div class="loader"><div id="progress" class="progress"></div></div>
    
    <div id="captcha-box">
        <p>Aktivitas mencurigakan terdeteksi. Selesaikan tantangan ini:</p>
        <p id="captcha-text" style="font-weight: bold; font-size: 1.2rem;"></p>
        <input type="number" id="captcha-input" placeholder="?">
        <button onclick="verifyCaptcha()">Verifikasi</button>
    </div>
</div>

<script>
    const statusText = document.getElementById('status');
    const progressBar = document.getElementById('progress');
    const captchaBox = document.getElementById('captcha-box');
    let progress = 0;
    let isSuspicious = Math.random() > 0.7; // 30% kemungkinan muncul captcha

    function generateToken(length) {
        return Math.random().toString(36).substring(2, 2 + length) + Date.now().toString(36);
    }

    function startProcess() {
        const interval = setInterval(() => {
            progress += 1.43; // Menuju 100% dalam ~7 detik
            progressBar.style.width = progress + "%";

            if (progress >= 100) {
                clearInterval(interval);
                if (isSuspicious) {
                    showCaptcha();
                } else {
                    completeVerification();
                }
            }
        }, 100);
    }

    function showCaptcha() {
        statusText.innerText = "Tantangan Diperlukan";
        captchaBox.style.display = "block";
        window.num1 = Math.floor(Math.random() * 10) + 1;
        window.num2 = Math.floor(Math.random() * 10) + 1;
        document.getElementById('captcha-text').innerText = `${window.num1} + ${window.num2} = ?`;
    }

    function verifyCaptcha() {
        const val = parseInt(document.getElementById('captcha-input').value);
        if (val === (window.num1 + window.num2)) {
            completeVerification();
        } else {
            alert("Jawaban salah, coba lagi.");
            showCaptcha();
        }
    }

    function completeVerification() {
        const token = generateToken(10);
        sessionStorage.setItem('rtysafe_token', token);
        statusText.innerText = "Verifikasi Berhasil! Mengalihkan...";
        setTimeout(() => {
            window.location.href = `index.html?token=${token}`;
        }, 1000);
    }

    window.onload = startProcess;
</script>
</body>
</html>
