<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Rtysafe | Verification</title>
    <style>
        body { background: #00e5ff; font-family: 'Arial Black', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; border: 4px solid #000; padding: 30px; box-shadow: 10px 10px 0px #000; text-align: center; width: 320px; }
        #timer { font-size: 3rem; margin: 20px 0; color: #ff0055; }
        #captcha { display: none; }
        input { width: 85%; padding: 10px; border: 3px solid #000; margin-bottom: 10px; font-weight: bold; text-align: center; }
        button { background: #00ff41; border: 3px solid #000; padding: 10px 20px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="margin:0">Rtysafe 🛡️</h2>
        <div id="loading">
            <p>Memeriksa Keamanan...</p>
            <div id="timer">7</div>
        </div>
        <div id="captcha">
            <p>Verifikasi Manual:</p>
            <div id="code-box" style="background:#eee; padding:10px; border:2px dashed #000; margin-bottom:10px; font-size:1.2rem; letter-spacing:5px;"></div>
            <input type="text" id="user-input" placeholder="Ketik kode di atas">
            <button onclick="validate()">VERIFIKASI</button>
        </div>
    </div>
    <script>
        let s = 7;
        let t = setInterval(() => {
            s--; document.getElementById('timer').innerText = s;
            if(s <= 0) {
                clearInterval(t);
                if(Math.random() > 0.4) { // Pemicu otomatis CAPTCHA
                    document.getElementById('loading').style.display='none';
                    document.getElementById('captcha').style.display='block';
                    window.c = Math.random().toString(36).substring(2,7).toUpperCase();
                    document.getElementById('code-box').innerText = window.c;
                } else { finish(); }
            }
        }, 1000);
        function validate() {
            if(document.getElementById('user-input').value.toUpperCase() === window.c) { finish(); }
            else { alert('Salah!'); location.reload(); }
        }
        function finish() {
            const tk = "RTY-" + Math.random().toString(36).substring(2);
            sessionStorage.setItem('rtysafe_session', tk);
            location.href = "index.html?token=" + tk;
        }
    </script>
</body>
</html>
