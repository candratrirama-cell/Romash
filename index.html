<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Secure</title>
</head>
<body>
    <h2>Welcome to the Homepage</h2>
    <p>If you can see this page, you have successfully verified!</p>

    <script>
        // Cek token di URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            // Kalau tidak ada token di URL, redirect ke halaman verifikasi (verify.html)
            window.location.href = 'verify.html';
        } else {
            // Token ditemukan, proses validasi token (misalnya cek di session atau database)

            // Hapus token dari URL setelah digunakan (menghindari penggunaan kembali token)
            history.replaceState(null, null, window.location.pathname);  // Menghapus query string (token) dari URL

            console.log('Valid token:', token);
            // Disini bisa lanjutkan akses ke halaman utama
        }
    </script>
</body>
</html>
