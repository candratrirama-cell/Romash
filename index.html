<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GUARDIANSITES - Memverifikasi...</title>
    <style>
        body { background: #fff; font-family: 'Arial Black', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .box { border: 4px solid #000; padding: 40px; box-shadow: 10px 10px 0 #000; text-align: center; max-width: 350px; }
        .scan { width: 100%; height: 10px; background: #eee; border: 2px solid #000; margin-top: 20px; position: relative; overflow: hidden; }
        .bar { width: 0%; height: 100%; background: #00FF66; animation: loading 5s linear forwards; }
        @keyframes loading { to { width: 100%; } }
        h1 { font-size: 22px; text-transform: uppercase; margin: 0; }
        p { font-size: 12px; color: #555; margin-top: 10px; }
    </style>
</head>
<body>

<div class="box">
    <h1>GUARDIANSITES</h1>
    <p>Menganalisis Browser & IP... <br>Mohon tidak menutup halaman ini.</p>
    <div class="scan"><div class="bar"></div></div>
</div>

<script>
    // Setelah 5 detik, buat token dan pindah ke objective.html
    setTimeout(() => {
        const ts = Math.floor(Date.now() / 1000); // Waktu sekarang (detik)
        const token = btoa("MARA-LOCK-" + ts); // Bikin Kunci Rahasia
        window.location.href = "objective.html?gs_token=" + token + "&ts=" + ts;
    }, 5000);
</script>

</body>
</html>
