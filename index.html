<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoR 1.1 - SMM Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0f172a] text-white font-sans min-h-screen p-5">

    <div class="max-w-md mx-auto bg-[#1e293b] rounded-2xl shadow-2xl p-6 border border-slate-700 mt-10">
        <h2 class="text-2xl font-bold text-center text-blue-400 mb-6">SMM PANEL SYSTEM</h2>

        <div class="mb-4">
            <label class="block text-xs font-semibold text-slate-400 mb-1">FILTER KATEGORI</label>
            <select id="filterType" class="w-full bg-slate-800 border border-slate-600 p-3 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                <option value="">Semua Layanan</option>
                <option value="Instagram">Instagram</option>
                <option value="TikTok">TikTok</option>
                <option value="Youtube">Youtube</option>
            </select>
        </div>

        <div class="mb-4">
            <label class="block text-xs font-semibold text-slate-400 mb-1">PILIH LAYANAN</label>
            <select id="serviceList" class="w-full bg-slate-800 border border-slate-600 p-3 rounded-lg outline-none">
                <option>Loading layanan...</option>
            </select>
        </div>

        <div class="mb-4">
            <label class="block text-xs font-semibold text-slate-400 mb-1">TARGET LINK</label>
            <input type="text" id="targetLink" placeholder="https://www.instagram.com/p/..." class="w-full bg-slate-800 border border-slate-600 p-3 rounded-lg outline-none">
        </div>

        <div class="grid grid-cols-2 gap-4 mb-6">
            <div>
                <label class="block text-xs font-semibold text-slate-400 mb-1">JUMLAH</label>
                <input type="number" id="inputQty" placeholder="0" class="w-full bg-slate-800 border border-slate-600 p-3 rounded-lg outline-none">
            </div>
            <div>
                <label class="block text-xs font-semibold text-slate-400 mb-1">TOTAL HARGA</label>
                <div id="displayPrice" class="w-full bg-slate-900 p-3 rounded-lg text-green-400 font-bold border border-slate-700">Rp 0</div>
            </div>
        </div>

        <button onclick="sendOrder()" id="btnOrder" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-xl font-bold shadow-lg transition-all active:scale-95">
            BUAT PESANAN
        </button>

        <div id="notif" class="mt-4 p-3 rounded-lg text-sm text-center hidden"></div>
    </div>

    <script>
        let allServices = [];

        // Ambil layanan saat halaman dibuka
        async function fetchServices() {
            const res = await fetch('/api/process', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'services' })
            });
            allServices = await res.json();
            updateDropdown("");
        }

        // Fungsi Filter
        function updateDropdown(keyword) {
            const select = document.getElementById('serviceList');
            select.innerHTML = "";
            const filtered = allServices.filter(s => s.name.toLowerCase().includes(keyword.toLowerCase()));
            
            filtered.forEach(s => {
                const opt = document.createElement('option');
                opt.value = s.service;
                opt.dataset.rate = s.rate;
                opt.textContent = `${s.name} - Rp ${s.rate}`;
                select.appendChild(opt);
            });
        }

        // Event Listener Filter & Harga
        document.getElementById('filterType').onchange = (e) => updateDropdown(e.target.value);
        document.getElementById('inputQty').oninput = function() {
            const selected = document.getElementById('serviceList').selectedOptions[0];
            const rate = selected ? selected.dataset.rate : 0;
            const total = (rate / 1000) * this.value;
            document.getElementById('displayPrice').innerText = "Rp " + Math.ceil(total).toLocaleString('id-ID');
        };

        // Kirim Order ke API Vercel
        async function sendOrder() {
            const btn = document.getElementById('btnOrder');
            const notif = document.getElementById('notif');
            
            const payload = {
                action: 'add',
                service: document.getElementById('serviceList').value,
                link: document.getElementById('targetLink').value,
                quantity: document.getElementById('inputQty').value
            };

            if(!payload.link || !payload.quantity) return alert("Isi semua data!");

            btn.disabled = true;
            btn.innerText = "SEDANG DIPROSES...";

            try {
                const res = await fetch('/api/process', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const result = await res.json();

                notif.classList.remove('hidden');
                if(result.order) {
                    notif.className = "mt-4 p-3 rounded-lg text-sm text-center bg-green-900/50 text-green-400 border border-green-700";
                    notif.innerText = "PESANAN BERHASIL! ID: " + result.order;
                } else {
                    notif.className = "mt-4 p-3 rounded-lg text-sm text-center bg-red-900/50 text-red-400 border border-red-700";
                    notif.innerText = "GAGAL: " + (result.error || "Saldo tidak cukup");
                }
            } catch (e) {
                alert("Terjadi kesalahan sistem.");
            } finally {
                btn.disabled = false;
                btn.innerText = "BUAT PESANAN";
            }
        }

        fetchServices();
    </script>
</body>
</html>
