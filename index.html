<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main App | Rtysafe</title>
    <style>
        body { display: none; margin: 0; background: #fff; font-family: sans-serif; }
        body.authorized {
            display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; background: #00ff41;
        }
        .card {
            background: white; border: 5px solid #000; padding: 40px; box-shadow: 15px 15px 0px #000; text-align: center;
        }
        .logo { font-size: 1.2rem; font-weight: 900; background: #000; color: #fff; padding: 5px 10px; margin-bottom: 20px; display: inline-block; }
    </style>
</head>
<body>

    <div class="card">
        <div class="logo">Rtysafe PROTECTED</div>
        <h1>Akses Berhasil!</h1>
        <p>Token Anda valid untuk sesi ini.</p>
        <button onclick="location.href='verify.html'" style="border: 2px solid #000; background: none; font-weight: bold; cursor: pointer; padding: 5px 10px;">Logout Sesi</button>
    </div>

    <script>
        (function() {
            const urlToken = new URLSearchParams(window.location.search).get('token');
            const sessionToken = sessionStorage.getItem('rtysafe_session');

            if (urlToken && urlToken === sessionToken) {
                document.body.classList.add('authorized');
                // Hapus jejak token di URL
                window.history.replaceState(null, "", window.location.pathname);
            } else {
                alert("Sistem Rtysafe: Akses ditolak.");
                window.location.href = "verify.html";
            }
        })();
    </script>
</body>
</html>
