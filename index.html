<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rtysafe - Main Dashboard</title>
    <style>
        :root {
            --bg: #000;
            --accent: #00ff41;
            --text: #fff;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Courier New', Courier, monospace;
            padding: 20px;
        }
        .main-content {
            display: none; /* Disembunyikan sampai verifikasi lolos */
            border: 2px dashed var(--accent);
            padding: 20px;
            max-width: 800px;
            margin: auto;
        }
        .header { border-bottom: 2px solid var(--accent); padding-bottom: 10px; margin-bottom: 20px; }
    </style>
</head>
<body>

<div id="app" class="main-content">
    <div class="header">
        <h1>ACCESS GRANTED</h1>
        <p>Sistem Rtysafe: Sesi Aktif</p>
    </div>
    <section>
        <p>Selamat datang di halaman utama yang aman.</p>
        <ul>
            <li>Token anda hanya berlaku di tab ini.</li>
            <li>Jika anda menyalin URL ini ke tab baru, akses akan ditolak.</li>
            <li>Menyegarkan halaman (F5) tetap diizinkan selama sesi tersimpan.</li>
        </ul>
    </section>
</div>

<script>
    function validateSession() {
        const urlParams = new URLSearchParams(window.location.search);
        const urlToken = urlParams.get('token');
        const sessionToken = sessionStorage.getItem('rtysafe_token');

        // Cek apakah token ada di URL dan cocok dengan storage
        if (urlToken && urlToken === sessionToken) {
            // Token Valid
            document.getElementById('app').style.display = 'block';
            
            // Bersihkan token dari URL tanpa reload untuk keamanan tambahan
            const cleanUrl = window.location.protocol + "//" + window.location.host + window.location.pathname;
            window.history.replaceState({path: cleanUrl}, '', cleanUrl);
        } else if (sessionToken && !urlToken) {
            // Token sudah pernah diverifikasi (User F5 halaman)
            document.getElementById('app').style.display = 'block';
        } else {
            // Token tidak valid atau tidak ada (Akses Ilegal / Tab Baru)
            alert("Sesi tidak valid atau telah berakhir. Harap verifikasi ulang.");
            window.location.href = 'verify.html';
        }
    }

    window.onload = validateSession;
</script>
</body>
</html>
