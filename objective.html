<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Objective - Terverifikasi</title>
    <script>
        // 1. Langsung sembunyikan biar gak kena scrap
        document.documentElement.style.display = 'none';

        (function() {
            const params = new URLSearchParams(window.location.search);
            const token = params.get('gs_token');
            const ts = params.get('ts');
            const now = Math.floor(Date.now() / 1000);
            
            // KUNCI HARUS SAMA PERSIS DENGAN index.html
            const expectedKey = btoa("MARA-SECURE-6288-" + ts);

            // 2. Logika Pengecekan (Toleransi 60 detik)
            if (token === expectedKey && (now - parseInt(ts)) < 60) {
                // LOLOS: Tampilkan konten
                document.addEventListener("DOMContentLoaded", function() {
                    document.documentElement.style.display = 'block';
                });
            } else {
                // GAGAL: Berarti dia masuk tanpa lewat index.html atau link sudah basi
                alert("Akses Ilegal! Silakan lewat gerbang depan.");
                window.location.href = "index.html";
            }
        })();
    </script>
    <style>
        body { background: #f0f0f0; font-family: 'Courier New', Courier, monospace; text-align: center; padding-top: 50px; }
        .box { background: white; border: 5px solid black; display: inline-block; padding: 20px; box-shadow: 10px 10px 0 #ff0055; }
        .status { color: green; font-weight: bold; font-size: 20px; }
    </style>
</head>
<body>

    <div class="box">
        <p class="status">✅ VERIFIED BY MARA</p>
        <h1>WOREK 1000% !!</h1>
        <p>Selamat, kamu masuk ke zona gak jelas.</p>
        <hr border="1">
        <p>IP Kamu: <span id="ip">127.0.0.1 (Hidden)</span></p>
        <p>Kunci Token: <small style="color:blue">Aktif</small></p>
        <button onclick="location.reload()" style="padding:10px; cursor:pointer">TES REFRESH (PASTI LOOP)</button>
        <p style="font-size:10px; color:red">*Kalau kamu refresh setelah 60 detik, kamu bakal ditendang balik ke depan.</p>
    </div>

    <script>
        console.log("Akses Diterima. Selamat datang, Developer!");
    </script>
</body>
</html>
