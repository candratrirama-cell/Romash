<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoR 1.1 - Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: #f8fafc; font-family: 'Courier New', monospace; }
        .glass { background: #0f172a; border: 1px solid #1e293b; border-radius: 20px; }
        .btn-accept { background: #10b981; color: #000; padding: 5px 10px; border-radius: 8px; font-weight: 900; font-size: 10px; cursor: pointer; }
        .btn-reject { background: #ef4444; color: #fff; padding: 5px 10px; border-radius: 8px; font-weight: 900; font-size: 10px; cursor: pointer; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-4xl mx-auto">
        <header class="mb-10 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-black italic text-emerald-500 uppercase tracking-tighter underline">Admin Control GoR 1.1</h1>
                <p class="text-[10px] opacity-40 uppercase">Manajemen Antrian Deposit</p>
            </div>
            <button onclick="loadPending()" class="bg-blue-600 px-4 py-2 rounded-full text-[10px] font-bold">REFRESH DATA</button>
        </header>

        <div class="glass p-6">
            <h2 class="text-xs font-bold uppercase mb-4 opacity-50 italic">Antrian Deposit Pending:</h2>
            <div id="listPending" class="space-y-4">
                <p class="text-[10px] opacity-30 italic text-center py-10">Mencari antrian...</p>
            </div>
        </div>
    </div>

    <script>
        // Fungsi untuk ambil semua data deposit yang statusnya Pending
        async function loadPending() {
            const list = document.getElementById('listPending');
            list.innerHTML = '<p class="text-[10px] opacity-30 italic text-center py-10">Sedang sinkronisasi...</p>';
            
            try {
                // Pastikan action 'get_all_depo' sudah ada di v1.js
                const r = await fetch('/api/v1?action=get_all_depo').then(r => r.json());
                
                if (r.length === 0) {
                    list.innerHTML = '<p class="text-[10px] opacity-30 italic text-center py-10">Tidak ada antrian deposit.</p>';
                    return;
                }

                list.innerHTML = r.map(item => `
                    <div class="bg-slate-900/50 p-4 rounded-xl border border-slate-800 flex justify-between items-center">
                        <div>
                            <p class="text-xs font-black text-emerald-400 uppercase">${item.username}</p>
                            <p class="text-[10px] opacity-60">Nominal: <span class="text-white font-bold">Rp ${parseInt(item.amt).toLocaleString()}</span></p>
                            <p class="text-[9px] opacity-40">Tagihan: Rp ${parseInt(item.bill).toLocaleString()} | ${item.tgl}</p>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="prosesDepo('${item.username}', ${item.index}, 'Success')" class="btn-accept">TERIMA</button>
                            <button onclick="prosesDepo('${item.username}', ${item.index}, 'Canceled')" class="btn-reject">TOLAK</button>
                        </div>
                    </div>
                `).join('');

            } catch (e) {
                list.innerHTML = '<p class="text-red-500 text-center py-10">Gagal terhubung ke API</p>';
            }
        }

        // Fungsi untuk Approve atau Reject
        async function prosesDepo(user, idx, status) {
            if(!confirm(`Konfirmasi ${status} untuk ${user}?`)) return;

            try {
                const r = await fetch(`/api/v1?action=confirm_depo&target_user=${user}&depo_idx=${idx}&status=${status}`).then(r => r.json());
                
                if(r.success) {
                    alert(r.message);
                    loadPending(); // Refresh list
                } else {
                    alert("Gagal: " + r.message);
                }
            } catch (e) {
                alert("Koneksi Error");
            }
        }

        // Jalankan saat halaman dibuka
        loadPending();
    </script>
</body>
</html>
