<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoR 1.1 - OTP Gateway</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&display=swap');
        body { background: #000; color: #00f2ff; font-family: 'Space Grotesk', sans-serif; }
        .card { border: 4px solid #00f2ff; background: #0a0a0a; box-shadow: 6px 6px 0px #00f2ff; }
        .inp { background: #111; border: 2px solid #00f2ff; color: #fff; padding: 12px; width: 100%; outline: none; margin-bottom: 15px; }
        .btn { background: #00f2ff; color: #00; font-weight: 900; padding: 12px; width: 100%; cursor: pointer; text-transform: uppercase; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .hidden { display: none; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div id="auth-box" class="max-w-md mx-auto mt-20 card p-8">
        <h1 class="text-3xl font-black mb-6 text-center italic">GoR 1.1 ACCESS</h1>
        <input type="text" id="u" class="inp" placeholder="USERNAME">
        <input type="password" id="p" class="inp" placeholder="PASSWORD">
        <button onclick="auth()" id="btn-login" class="btn">Masuk Console</button>
    </div>

    <div id="dash" class="max-w-5xl mx-auto hidden">
        <div class="flex justify-between items-center mb-8 border-b-4 border-cyan-400 pb-4">
            <h1 class="text-2xl font-black italic uppercase">Dashboard Provider</h1>
            <button onclick="location.reload()" class="bg-red-600 text-white px-3 py-1 text-xs">EXIT</button>
        </div>

        <div class="grid md:grid-cols-2 gap-8">
            <div class="card p-6">
                <h2 class="font-bold mb-4 uppercase text-sm">1. Kirim OTP ke WA</h2>
                <input type="text" id="target" class="inp" placeholder="628xxx">
                <button onclick="reqOTP()" id="btn-req" class="btn bg-white text-black">Kirim Sekarang</button>
                <div id="status-req" class="mt-4 text-center font-bold text-xs">READY</div>
            </div>

            <div class="card p-6">
                <h2 class="font-bold mb-4 uppercase text-sm">2. Verifikasi Kode</h2>
                <input type="text" id="otp-input" class="inp" placeholder="Masukkan 4 Digit OTP">
                <button onclick="verifyOTP()" id="btn-ver" class="btn bg-yellow-400">Cek Validasi</button>
                <div id="status-ver" class="mt-4 text-center font-bold text-xs italic">Menunggu Input...</div>
            </div>

            <div class="card p-6 md:col-span-2">
                <h2 class="font-bold mb-4 uppercase text-sm">Isi Saldo (QRIS)</h2>
                <div class="flex gap-4">
                    <input type="number" id="amt" class="inp mb-0" placeholder="Rp 1.000">
                    <button onclick="getQRIS()" id="btn-qris" class="btn w-1/3">Get QR</button>
                </div>
                <div id="qr-display" class="hidden mt-6 text-center">
                    <img id="qr-img" class="mx-auto w-40 border-4 border-white mb-2">
                    <p class="text-[10px]">Silahkan Scan & Bayar</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let myKey = "";

        async function auth() {
            const u = document.getElementById('u').value;
            const p = document.getElementById('p').value;
            const res = await fetch('/api/auth', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({u, p}) });
            const data = await res.json();
            if(data.status) {
                myKey = data.data.apikey;
                document.getElementById('auth-box').classList.add('hidden');
                document.getElementById('dash').classList.remove('hidden');
            } else alert(data.msg);
        }

        async function reqOTP() {
            const target = document.getElementById('target').value;
            const btn = document.getElementById('btn-req');
            btn.disabled = true;
            document.getElementById('status-req').innerText = "SENDING...";

            const res = await fetch('/api/request-otp', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ apikey: myKey, target })
            });
            const data = await res.json();
            document.getElementById('status-req').innerText = data.status ? "TERKIRIM!" : "GAGAL!";
            btn.disabled = false;
        }

        async function verifyOTP() {
            const inputCode = document.getElementById('otp-input').value;
            const status = document.getElementById('status-ver');
            
            const res = await fetch('/api/verify-otp', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ inputCode })
            });
            const data = await res.json();
            status.innerText = data.msg;
            status.className = data.status ? "mt-4 text-center font-bold text-green-400" : "mt-4 text-center font-bold text-red-500";
        }

        async function getQRIS() {
            const amount = document.getElementById('amt').value;
            const btn = document.getElementById('btn-qris');
            btn.disabled = true;
            
            const res = await fetch('/api/order', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ amount })
            });
            const data = await res.json();
            if(data.status) {
                document.getElementById('qr-img').src = data.qr;
                document.getElementById('qr-display').classList.remove('hidden');
            } else alert("Hokto API Error!");
            btn.disabled = false;
        }
    </script>
</body>
</html>
