<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoR Partner API</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: #fff; font-family: 'Inter', sans-serif; }
        .glass { background: #0f172a; border: 1px solid #1e293b; border-radius: 20px; }
        .nav-active { color: #10b981; border-bottom: 2px solid #10b981; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div id="loginArea" class="max-w-md mx-auto mt-20 glass p-8">
        <h2 class="font-black italic mb-6">PARTNER LOGIN</h2>
        <input type="text" id="u" placeholder="Username" class="w-full bg-black p-3 rounded-lg mb-4 border border-slate-800">
        <input type="password" id="p" placeholder="Password" class="w-full bg-black p-3 rounded-lg mb-6 border border-slate-800 text-emerald-500">
        <button onclick="doLogin()" class="w-full bg-emerald-600 p-3 rounded-lg font-black italic">MASUK</button>
    </div>

    <div id="mainArea" class="max-w-3xl mx-auto hidden">
        <nav class="flex justify-between items-center mb-10">
            <h1 class="text-xl font-black italic text-emerald-500">GoR PARTNER</h1>
            <button onclick="localStorage.clear(); location.reload();" class="text-[9px] opacity-40 uppercase">Keluar</button>
        </nav>

        <section class="glass p-6 mb-6">
            <p class="text-[10px] opacity-50 mb-1">SALDO API</p>
            <h2 id="bal" class="text-3xl font-black">Rp 0</h2>
            <div class="mt-4 bg-black p-3 rounded-lg flex justify-between items-center">
                <code id="apikey" class="text-[10px] text-emerald-400 font-mono">xapik1...</code>
                <button onclick="navigator.clipboard.writeText(session.apikey); alert('Copied!')" class="text-[10px] font-bold">COPY</button>
            </div>
        </section>

        <div class="glass p-6 text-center space-y-4">
            <h3 class="font-black italic text-xs uppercase">Top Up Saldo (Admin 10%)</h3>
            <input type="number" id="amt" placeholder="Nominal" class="w-full bg-black p-3 rounded-lg border border-slate-800">
            <button onclick="genQR()" class="w-full bg-emerald-600 p-3 rounded-lg font-black text-xs italic">GENERATE QRIS</button>
            <div id="qrArea" class="flex flex-col items-center"></div>
        </div>
    </div>

    <script>
        let session = JSON.parse(localStorage.getItem('pData'));
        if(session) { document.getElementById('loginArea').classList.add('hidden'); document.getElementById('mainArea').classList.remove('hidden'); renderUI(); }

        async function doLogin() {
            const res = await fetch(`/api/v1?action=login&username=${document.getElementById('u').value}&password=${document.getElementById('p').value}`).then(r=>r.json());
            if(res.success) { localStorage.setItem('pData', JSON.stringify(res.user)); location.reload(); } else { alert("Login Salah!"); }
        }

        async function genQR() {
            const a = document.getElementById('amt').value;
            const res = await fetch(`/api/v1?action=create_qris&amount=${a}&username=${session.username}`).then(r=>r.json());
            if(res.qr) {
                document.getElementById('qrArea').innerHTML = `
                    <div class="bg-white p-2 rounded-xl mt-4"><img src="https://api.qrserver.com/v1/create-qr-code/?data=${encodeURIComponent(res.qr)}" class="w-40 h-40"></div>
                    <p class="mt-2 font-black text-emerald-400">Total: Rp ${res.total.toLocaleString()}</p>
                    <button onclick="confirmWA('${res.total}')" class="mt-4 bg-green-600 p-2 rounded text-[9px] font-bold">KONFIRMASI WHATSAPP</button>
                `;
            }
        }

        function confirmWA(t) { window.open(`https://wa.me/62882008519349?text=Halo Bos, Saya sudah bayar Top Up API Rp ${t} (User: ${session.username})`, '_blank'); }
        function renderUI() { document.getElementById('bal').innerText = "Rp " + session.balance.toLocaleString(); document.getElementById('apikey').innerText = session.apikey; }
    </script>
</body>
</html>
