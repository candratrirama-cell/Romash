<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoR 1.1 - Provider Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&display=swap');
        body { background: #000; color: #00f2ff; font-family: 'Space Grotesk', sans-serif; }
        .brutal-card { border: 4px solid #00f2ff; background: #050505; box-shadow: 10px 10px 0px #00f2ff; transition: 0.2s; }
        .brutal-input { background: #111; border: 2px solid #00f2ff; color: #fff; padding: 12px; width: 100%; outline: none; margin-bottom: 15px; }
        .brutal-btn { background: #00f2ff; color: #000; font-weight: 900; padding: 12px; width: 100%; border: none; cursor: pointer; text-transform: uppercase; box-shadow: 4px 4px 0px #fff; }
        .brutal-btn:active { transform: translate(3px, 3px); box-shadow: none; }
        .code-block { background: #111; border-left: 4px solid #00f2ff; padding: 10px; font-family: monospace; color: #00f2ff; font-size: 0.75rem; }
        .hidden { display: none; }
    </style>
</head>
<body class="p-6">

    <div id="login-box" class="max-w-sm mx-auto mt-20 brutal-card p-8">
        <h1 class="text-3xl font-black italic mb-6 text-center">GoR 1.1<br>ADMIN LOGIN</h1>
        <input type="password" id="pass" class="brutal-input" placeholder="PASSWORD CONSOLE">
        <button onclick="login()" class="brutal-btn">Enter System</button>
    </div>

    <div id="dashboard" class="max-w-6xl mx-auto hidden">
        <header class="flex justify-between items-center mb-10 border-b-4 border-cyan-400 pb-4">
            <h1 class="text-3xl font-black italic uppercase">Provider Console</h1>
            <button onclick="location.reload()" class="bg-red-600 text-white px-4 py-1 text-xs font-bold">EXIT</button>
        </header>

        <div class="grid md:grid-cols-3 gap-8">
            <div class="brutal-card p-6">
                <h2 class="font-bold mb-4 uppercase">🔑 API Key Manager</h2>
                <input type="text" id="api-key-res" class="brutal-input text-xs" readonly value="G-DEFAULT-12345">
                <button onclick="genKey()" class="brutal-btn bg-white text-black mb-4">Generate New</button>
                <p class="text-[10px] opacity-70">Berikan key ini ke developer yang berlangganan jasa kamu.</p>
            </div>

            <div class="brutal-card p-6 text-center">
                <h2 class="font-bold mb-4 uppercase">📱 OTP Monitor</h2>
                <div id="otp-screen" class="text-6xl font-black py-10 bg-zinc-900 border-2 border-dashed border-cyan-400 mb-6">------</div>
                <button onclick="refreshOTP()" class="brutal-btn">Refresh OTP</button>
            </div>

            <div class="brutal-card p-6 bg-zinc-900">
                <h2 class="font-bold mb-4 uppercase text-white">📑 API Integration</h2>
                <p class="text-[11px] text-gray-400 mb-4">Suruh developer client kamu memanggil URL ini untuk verifikasi login:</p>
                <div class="code-block mb-4">
                    GET /api/get-latest?apikey=YOUR_KEY
                </div>
                <h3 class="text-xs font-bold mb-2">TOP UP BALANCE</h3>
                <input type="number" id="amt" class="brutal-input text-xs mb-2" placeholder="Nominal Rp">
                <button onclick="getQRIS()" class="brutal-btn bg-white text-black text-xs py-2">Get QRIS</button>
                <img id="qr-img" class="hidden mt-4 mx-auto w-32 border-2 border-white">
            </div>
        </div>
    </div>

    <script>
        // Simple Login System
        function login() {
            const p = document.getElementById('pass').value;
            if(p === "123") { // Ganti password di sini
                document.getElementById('login-box').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
            } else { alert("Password Salah!"); }
        }

        // Key Gen
        function genKey() {
            const k = "G-" + Math.random().toString(36).substring(2, 12).toUpperCase();
            document.getElementById('api-key-res').value = k;
        }

        // Refresh OTP
        async function refreshOTP() {
            const screen = document.getElementById('otp-screen');
            screen.innerText = "...";
            const res = await fetch('/api/get-latest?apikey=KEY-12345');
            const data = await res.json();
            screen.innerText = data.otp || "EMPTY";
        }

        // Get QRIS
        async function getQRIS() {
            const amount = document.getElementById('amt').value;
            const res = await fetch('/api/order', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ amount })
            });
            const data = await res.json();
            if(data.qr) {
                document.getElementById('qr-img').src = data.qr;
                document.getElementById('qr-img').classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
