<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoR 1.1 Partner API</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: #f8fafc; font-family: monospace; }
        .glass { background: #0f172a; border: 1px solid #1e293b; border-radius: 20px; }
        .nav-active { color: #10b981; border-bottom: 2px solid #10b981; opacity: 1 !important; }
        input { background: #020617; border: 1px solid #334155; padding: 12px; border-radius: 12px; width: 100%; color: #10b981; }
        .svc-card:hover { border-color: #10b981; transform: translateY(-2px); transition: all 0.2s; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div id="authArea" class="max-w-md mx-auto mt-10 glass p-8">
        <div class="flex gap-6 mb-8 border-b border-slate-800 pb-3">
            <button onclick="tabAuth('login')" id="btn-login" class="nav-active text-xs font-black uppercase">LOGIN</button>
            <button onclick="tabAuth('reg')" id="btn-reg" class="text-xs font-black uppercase opacity-40">DAFTAR</button>
        </div>
        <div id="f-login"><input type="text" id="u" placeholder="Username" class="mb-4"><input type="password" id="p" placeholder="Password" class="mb-6"><button onclick="doLogin()" class="w-full bg-emerald-600 p-4 rounded-xl font-black text-black">MASUK</button></div>
        <div id="f-reg" class="hidden"><input type="text" id="ru" placeholder="Username Baru" class="mb-4"><input type="password" id="rp" placeholder="Password Baru" class="mb-6"><button onclick="doReg()" class="w-full bg-blue-600 p-4 rounded-xl font-black text-white">DAFTAR SEKARANG</button></div>
    </div>

    <div id="mainArea" class="max-w-4xl mx-auto hidden">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-xl font-black italic text-emerald-500 underline">GoR 1.1 PARTNER</h1>
            <button onclick="localStorage.clear(); location.reload();" class="text-[10px] text-red-500 font-bold uppercase">Logout</button>
        </header>

        <nav class="flex gap-6 mb-8 border-b border-slate-800 overflow-x-auto pb-2">
            <button onclick="tab('dash')" id="t-dash" class="nav-active text-[10px] font-bold uppercase shrink-0">1. Dashboard</button>
            <button onclick="tab('top')" id="t-top" class="text-[10px] font-bold uppercase opacity-40 shrink-0">2. Isi Saldo</button>
            <button onclick="tab('svc')" id="t-svc" class="text-[10px] font-bold uppercase opacity-40 shrink-0">3. Layanan SMM</button>
            <button onclick="tab('doc')" id="t-doc" class="text-[10px] font-bold uppercase opacity-40 shrink-0">4. API Docs</button>
        </nav>

        <section id="p-dash" class="space-y-4">
            <div class="glass p-6"><p class="text-[10px] opacity-40 uppercase">Saldo API Anda</p><h2 id="bal" class="text-4xl font-black">Rp 0</h2></div>
            <div class="glass p-6"><p class="text-[10px] opacity-40 uppercase mb-2">API Key Partner</p><div class="bg-black p-4 rounded-xl flex justify-between items-center border border-emerald-900/30"><code id="apikey" class="text-[11px] text-emerald-400 font-bold">xapik1...</code><button onclick="copy('apikey')" class="text-[9px] font-black uppercase text-white/50">Copy</button></div></div>
        </section>

        <section id="p-top" class="hidden glass p-8 text-center space-y-6">
            <h2 class="font-black">ISI SALDO (ADMIN 10%)</h2>
            <input type="number" id="amt" placeholder="Nominal Saldo">
            <button onclick="genQR()" class="w-full bg-emerald-600 p-4 rounded-xl font-black text-black">BUAT QRIS</button>
            <div id="qrArea" class="flex flex-col items-center"></div>
        </section>

        <section id="p-svc" class="hidden space-y-4">
            <div class="glass p-4"><input type="text" id="searchSvc" onkeyup="filterSvc()" placeholder="Cari layanan (Contoh: Instagram, TikTok)..."></div>
            <div id="svcList" class="grid grid-cols-1 md:grid-cols-2 gap-4 h-[500px] overflow-y-auto pr-2"></div>
        </section>

        <section id="p-doc" class="hidden space-y-6 glass p-6">
            <h3 class="font-black text-emerald-500 uppercase">Endpoint Utama</h3>
            <code class="text-[10px] bg-black p-3 block rounded text-emerald-400 break-all">https://romash.vercel.app/api/v1?store=smm&key=API_KEY&action=add&service=ID&link=TARGET&qty=QTY</code>
        </section>
    </div>

    <script>
        let session = JSON.parse(localStorage.getItem('pData')), allSvcs = [];
        if(session) { document.getElementById('authArea').classList.add('hidden'); document.getElementById('mainArea').classList.remove('hidden'); renderUI(); }

        function tabAuth(t) { ['login','reg'].forEach(x => { document.getElementById('f-'+x).classList.toggle('hidden', x!==t); document.getElementById('btn-'+x).classList.toggle('nav-active', x===t); document.getElementById('btn-'+x).classList.toggle('opacity-40', x!==t); }); }
        async function doLogin() {
            const r = await fetch(`/api/v1?action=login&username=${document.getElementById('u').value}&password=${document.getElementById('p').value}`).then(r=>r.json());
            if(r.success) { localStorage.setItem('pData', JSON.stringify(r.user)); location.reload(); } else alert("Salah!");
        }
        async function doReg() {
            const r = await fetch(`/api/v1?action=register&username=${document.getElementById('ru').value}&password=${document.getElementById('rp').value}`).then(r=>r.json());
            if(r.success) { alert("Berhasil!"); tabAuth('login'); } else alert("Gagal!");
        }
        function tab(t) { ['dash','top','svc','doc'].forEach(x => { document.getElementById('p-'+x).classList.toggle('hidden', x!==t); document.getElementById('t-'+x).classList.toggle('nav-active', x===t); document.getElementById('t-'+x).classList.toggle('opacity-40', x!==t); }); if(t==='svc') loadSvc(); }

        async function loadSvc() {
            const list = document.getElementById('svcList');
            list.innerHTML = '<p class="text-center opacity-30 mt-10 col-span-2">Loading Services...</p>';
            allSvcs = await fetch('/api/v1?action=services').then(r=>r.json());
            renderSvc(allSvcs);
        }

        function renderSvc(data) {
            document.getElementById('svcList').innerHTML = data.map(s => `
                <div class="glass p-5 svc-card border-slate-800">
                    <div class="flex justify-between mb-2"><span class="text-[8px] bg-emerald-900/30 text-emerald-400 px-2 py-1 rounded font-bold uppercase">${s.category}</span><span class="text-[9px] font-bold">ID: ${s.service}</span></div>
                    <p class="text-[11px] font-bold text-slate-200 mb-3 leading-relaxed">${s.name}</p>
                    <div class="flex justify-between items-end border-t border-slate-800/50 pt-3">
                        <div><p class="text-[8px] opacity-40 uppercase">Price/1k</p><p class="text-xs font-black text-emerald-500">Rp ${parseFloat(s.rate).toLocaleString()}</p></div>
                        <div class="text-right"><p class="text-[8px] opacity-40 uppercase">Min/Max</p><p class="text-[9px] font-bold">${s.min}/${s.max}</p></div>
                    </div>
                </div>
            `).join('');
        }

        function filterSvc() {
            const val = document.getElementById('searchSvc').value.toLowerCase();
            const filtered = allSvcs.filter(s => s.name.toLowerCase().includes(val) || s.category.toLowerCase().includes(val));
            renderSvc(filtered);
        }

        async function genQR() {
            const r = await fetch(`/api/v1?action=create_qris&amount=${document.getElementById('amt').value}&username=${session.username}`).then(r=>r.json());
            if(r.qr) document.getElementById('qrArea').innerHTML = `<div class="bg-white p-2 rounded-xl mt-4"><img src="https://api.qrserver.com/v1/create-qr-code/?data=${encodeURIComponent(r.qr)}" class="w-40 h-40"></div><p class="mt-2 font-black text-emerald-400">Total: Rp ${r.total.toLocaleString()}</p><button onclick="window.open('https://wa.me/62882008519349?text=Konfirmasi+Bayar+Rp+${r.total}', '_blank')" class="mt-4 bg-green-600 p-2 rounded text-[10px] font-bold text-black">KONFIRMASI WHATSAPP</button>`;
        }
        function renderUI() { document.getElementById('bal').innerText = "Rp " + session.balance.toLocaleString(); document.getElementById('apikey').innerText = session.apikey; }
        function copy(id) { navigator.clipboard.writeText(document.getElementById(id).innerText); alert("Copied!"); }
    </script>
</body>
</html>
