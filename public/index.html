<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoR 1.1 - OTP Gateway</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&display=swap');
        
        body { 
            background: #000; 
            color: #00f2ff; 
            font-family: 'Space Grotesk', sans-serif; 
            overflow-x: hidden;
        }

        .brutal-card { 
            border: 4px solid #00f2ff; 
            background: #050505; 
            box-shadow: 10px 10px 0px #00f2ff;
            transition: all 0.2s ease;
        }

        .brutal-input { 
            background: #111; 
            border: 3px solid #00f2ff; 
            color: #fff; 
            padding: 12px; 
            width: 100%; 
            outline: none;
            font-weight: bold;
        }

        .brutal-btn { 
            background: #00f2ff; 
            color: #000; 
            padding: 15px; 
            width: 100%; 
            font-weight: 900; 
            text-transform: uppercase; 
            border: none; 
            cursor: pointer; 
            box-shadow: 5px 5px 0px #fff;
            display: block;
        }

        .brutal-btn:active { 
            transform: translate(3px, 3px); 
            box-shadow: 0px 0px 0px #fff; 
        }

        .brutal-btn:hover { background: #fff; color: #000; }

        .neon-text { text-shadow: 0 0 10px #00f2ff; }
        
        .hidden { display: none; }
        
        #otp-display {
            background: #111;
            border: 2px dashed #00f2ff;
            padding: 20px;
            font-size: 3rem;
            letter-spacing: 10px;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div id="login-box" class="max-w-sm w-full brutal-card p-8">
        <h1 class="text-4xl font-black mb-8 italic text-center neon-text">GoR 1.1<br>SYSTEM</h1>
        <div class="mb-4">
            <label class="block mb-2 font-bold uppercase">Username</label>
            <input type="text" id="u" class="brutal-input" placeholder="ID PEMBANTU" autocomplete="off">
        </div>
        <div class="mb-6">
            <label class="block mb-2 font-bold uppercase">Password</label>
            <input type="password" id="p" class="brutal-input" placeholder="••••••••">
        </div>
        <button id="btn-login" onclick="login()" class="brutal-btn">Access System</button>
    </div>

    <div id="dashboard" class="max-w-md w-full brutal-card p-8 hidden">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-bold uppercase italic">User: <span id="display-u" class="text-white"></span></h2>
            <button onclick="location.reload()" class="w-auto p-2 bg-red-600 text-white text-xs font-bold uppercase">Logout</button>
        </div>

        <div class="mb-8 border-b-4 border-cyan-400 pb-4">
            <p class="text-sm font-bold uppercase opacity-70">Current Balance</p>
            <div class="text-6xl font-black italic neon-text">RP <span id="display-b">0</span></div>
        </div>

        <div class="mb-8">
            <button onclick="getOTP()" class="brutal-btn bg-yellow-400 mb-4" style="color: black; box-shadow: 5px 5px 0px #00f2ff;">
                Request Latest OTP (10 RP)
            </button>
            <p class="text-xs text-center italic opacity-60">*Saldo otomatis terpotong saat OTP ditemukan.</p>
        </div>

        <div id="otp-area" class="text-center">
            <p class="font-bold mb-2 uppercase">Your OTP Code:</p>
            <div id="otp-display" class="font-black text-white italic">------</div>
        </div>
    </div>

    <script>
        let currentUserId = "";

        // Fungsi Login Utama
        async function login() {
            const username = document.getElementById('u').value;
            const password = document.getElementById('p').value;
            const btn = document.getElementById('btn-login');

            if (!username || !password) {
                alert("Please fill all fields!");
                return;
            }

            btn.innerText = "AUTHENTICATING...";
            btn.disabled = true;

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (data.status) {
                    currentUserId = username;
                    document.getElementById('display-u').innerText = username;
                    document.getElementById('display-b').innerText = data.balance;
                    
                    document.getElementById('login-box').classList.add('hidden');
                    document.getElementById('dashboard').classList.remove('hidden');
                } else {
                    alert(data.msg || "Invalid Credentials!");
                }
            } catch (err) {
                console.error(err);
                alert("Connection failed to Cloud!");
            } finally {
                btn.innerText = "Access System";
                btn.disabled = false;
            }
        }

        // Fungsi Ambil OTP & Potong Saldo
        async function getOTP() {
            const otpBox = document.getElementById('otp-display');
            otpBox.innerText = "WAIT...";
            
            try {
                const response = await fetch(`/api/get-otp?userId=${currentUserId}`);
                const data = await response.json();

                if (data.status) {
                    otpBox.innerText = data.otp;
                    // Update Saldo Realtime
                    document.getElementById('display-b').innerText = data.sisa;
                } else {
                    otpBox.innerText = "------";
                    alert(data.msg || "Gagal mengambil OTP");
                }
            } catch (err) {
                alert("API Error!");
                otpBox.innerText = "------";
            }
        }

        // Fitur Enter Key agar lebih responsif
        document.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                const loginBox = document.getElementById('login-box');
                if (!loginBox.classList.contains('hidden')) {
                    login();
                }
            }
        });
    </script>
</body>
</html>
