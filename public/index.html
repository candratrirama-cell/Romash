<!DOCTYPE html>
<html>
<head>
    <title>GoR 1.1 - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #00f2ff; font-family: monospace; }
        .brutal { border: 4px solid #00f2ff; box-shadow: 8px 8px 0px #00f2ff; background: #050505; }
        input { background: #111; border: 2px solid #00f2ff; padding: 10px; width: 100%; color: #fff; margin-bottom: 10px; }
        button { background: #00f2ff; color: #000; padding: 10px; width: 100%; font-weight: bold; border: none; cursor: pointer; }
        .hidden { display: none; }
    </style>
</head>
<body class="p-6">
    <div id="login-form" class="max-w-sm mx-auto brutal p-6 mt-10">
        <h1 class="text-2xl mb-4 font-black italic">GoR 1.1 LOGIN</h1>
        <input type="text" id="user" placeholder="USERNAME">
        <input type="password" id="pass" placeholder="PASSWORD">
        <button onclick="login()">ENTER SYSTEM</button>
    </div>

    <div id="dash" class="max-w-md mx-auto brutal p-6 mt-10 hidden">
        <h2 class="text-xl">ID: <span id="uid"></span></h2>
        <h2 class="text-3xl font-black mb-4">BALANCE: RP <span id="ubal"></span></h2>
        <button onclick="getOTP()" class="bg-yellow-400">AMBIL OTP (RP 10)</button>
        <div id="otp-res" class="mt-4 text-4xl text-center font-bold"></div>
    </div>

    <script>
        let currentId = "";
        async function login() {
            const username = document.getElementById('user').value;
            const password = document.getElementById('pass').value;
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            if(data.status) {
                currentId = username;
                document.getElementById('uid').innerText = username;
                document.getElementById('ubal').innerText = data.balance;
                document.getElementById('login-form').classList.add('hidden');
                document.getElementById('dash').classList.remove('hidden');
            } else { alert(data.msg); }
        }

        async function getOTP() {
            const res = await fetch(`/api/get-otp?userId=${currentId}`);
            const data = await res.json();
            if(data.status) {
                document.getElementById('otp-res').innerText = data.otp;
                document.getElementById('ubal').innerText = data.sisa;
            } else { alert(data.msg); }
        }
    </script>
</body>
</html>
