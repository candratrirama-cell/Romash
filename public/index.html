<!DOCTYPE html>
<html>
<head>
    <title>GoR 1.1 Provider</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #00f2ff; font-family: 'Courier New', Courier, monospace; }
        .box { border: 5px solid #00f2ff; box-shadow: 10px 10px 0px #00f2ff; background: #050505; }
        .btn { background: #00f2ff; color: #000; font-weight: 900; padding: 10px; width: 100%; border: none; cursor: pointer; }
        input { background: #111; border: 2px solid #00f2ff; color: #fff; padding: 10px; width: 100%; margin-bottom: 10px; }
    </style>
</head>
<body class="p-8">
    <div class="max-w-md mx-auto box p-6">
        <h1 class="text-2xl font-black italic mb-4">GoR 1.1 OTP PROVIDER</h1>
        
        <div class="mb-6">
            <p class="text-xs mb-1">TOPUP SALDO DEVELOPER</p>
            <input type="number" id="amt" placeholder="Amount (min 500)">
            <button class="btn mb-4" onclick="bayar()">GENERATE QRIS</button>
            <div id="qris-area" class="hidden text-center bg-white p-2">
                <img id="qr-img" class="mx-auto w-48">
            </div>
        </div>

        <div class="border-t-2 border-cyan-500 pt-4">
            <p class="text-xs mb-2">LATEST OTP FROM WA:</p>
            <div id="otp-box" class="text-5xl font-black text-center py-4 bg-zinc-900 border-2 border-dashed border-cyan-400">----</div>
            <button class="btn mt-4 bg-yellow-400" onclick="cekOTP()">REFRESH OTP</button>
        </div>
    </div>

    <script>
        async function bayar() {
            const amt = document.getElementById('amt').value;
            const res = await fetch('/api/create-payment', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ amount: amt })
            });
            const data = await res.json();
            if(data.qr) {
                document.getElementById('qr-img').src = data.qr;
                document.getElementById('qris-area').classList.remove('hidden');
            } else { alert("Gagal!"); }
        }

        async function cekOTP() {
            const res = await fetch('/api/get-latest?apikey=KEY-12345');
            const data = await res.json();
            document.getElementById('otp-box').innerText = data.otp || "WAIT";
        }
    </script>
</body>
</html>
