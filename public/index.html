<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Jasa OTP Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; }
        .card { border: 4px solid #0f0; box-shadow: 10px 10px 0px #0f0; background: #111; }
        input { background: #222; border: 2px solid #0f0; padding: 10px; color: #fff; width: 100%; }
        button { background: #0f0; color: #000; font-weight: bold; padding: 10px 20px; cursor: pointer; }
        button:hover { background: #fff; }
    </style>
</head>
<body class="p-5">
    <div class="max-w-md mx-auto card p-6">
        <h1 class="text-2xl mb-4">OTP GATEWAY BY @MARAMADHONA</h1>
        
        <div id="login-section">
            <input type="text" id="userId" placeholder="Masukkan Nama/ID Anda">
            <button class="mt-3 w-full" onclick="login()">MASUK</button>
        </div>

        <div id="main-section" class="hidden">
            <p class="text-xl">ID: <span id="displayId"></span></p>
            <p class="text-xl mb-4">SALDO: Rp <span id="balance">0</span></p>
            
            <hr class="border-green-500 mb-4">
            
            <h2 class="mb-2">TOP UP SALDO</h2>
            <input type="number" id="amount" placeholder="Min Rp 500">
            <button class="mt-2 w-full" onclick="topup()">BELI QRIS</button>
            <div id="qr-area" class="mt-4"></div>

            <hr class="border-green-500 my-4">
            
            <button class="w-full bg-blue-500 text-white" onclick="getOTP()">AMBIL OTP (Rp 10)</button>
            <div id="otp-result" class="mt-4 text-center text-3xl font-bold text-yellow-400"></div>
        </div>
    </div>

    <script>
        async function login() {
            const id = document.getElementById('userId').value;
            if(!id) return alert("Isi ID!");
            const res = await fetch(`/api/user/${id}`);
            const data = await res.json();
            document.getElementById('balance').innerText = data.balance;
            document.getElementById('displayId').innerText = id;
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('main-section').classList.remove('hidden');
        }

        async function topup() {
            const userId = document.getElementById('displayId').innerText;
            const amount = document.getElementById('amount').value;
            const res = await fetch('/api/order', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ userId, amount })
            });
            const data = await res.json();
            if(data.qr) {
                document.getElementById('qr-area').innerHTML = `<img src="${data.qr}" class="mx-auto"> <p class="text-center mt-2">Scan & Bayar, lalu Refresh</p>`;
            }
        }

        async function getOTP() {
            const userId = document.getElementById('displayId').innerText;
            const res = await fetch(`/api/get-otp?userId=${userId}`);
            const data = await res.json();
            if(data.status) {
                document.getElementById('otp-result').innerText = data.otp;
                login(); // Update saldo
            } else {
                alert(data.msg);
            }
        }
    </script>
</body>
</html>
