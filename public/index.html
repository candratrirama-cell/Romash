<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoR 1.1 - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&display=swap');
        body { background: #000; color: #00f2ff; font-family: 'Space Grotesk', sans-serif; }
        .card { border: 4px solid #00f2ff; background: #080808; box-shadow: 8px 8px 0px #00f2ff; margin-bottom: 20px; padding: 20px; }
        .inp { background: #111; border: 2px solid #00f2ff; color: #fff; padding: 10px; width: 100%; outline: none; margin-bottom: 10px; }
        .btn { background: #00f2ff; color: #000; font-weight: 900; padding: 10px; width: 100%; cursor: pointer; text-transform: uppercase; }
        .hidden { display: none; }
        pre { background: #111; padding: 10px; border-left: 4px solid #00f2ff; color: #fff; font-size: 10px; overflow-x: auto; }
    </style>
</head>
<body class="p-6">

    <div id="login-screen" class="max-w-md mx-auto mt-20 card">
        <h1 class="text-3xl font-black italic text-center mb-6">LOGIN GOR 1.1</h1>
        <input type="text" id="u" class="inp" placeholder="USERNAME">
        <input type="password" id="p" class="inp" placeholder="PASSWORD">
        <button onclick="handleLogin()" class="btn">MASUK</button>
    </div>

    <div id="dash-screen" class="max-w-6xl mx-auto hidden">
        <div class="flex justify-between items-center mb-10 border-b-4 border-cyan-400 pb-4">
            <h1 class="text-2xl font-black italic uppercase">Provider Console</h1>
            <button onclick="location.reload()" class="bg-red-600 text-white px-4 py-1 text-xs">LOGOUT</button>
        </div>

        <div class="grid md:grid-cols-3 gap-6">
            <div class="card">
                <h2 class="font-bold mb-2 uppercase text-xs">API KEY ANDA</h2>
                <input type="text" id="view-key" class="inp text-[10px]" readonly>
                <h2 class="font-bold mb-2 uppercase text-xs">SALDO</h2>
                <div class="text-3xl font-black text-yellow-400">RP <span id="view-bal">0</span></div>
            </div>

            <div class="card">
                <h2 class="font-bold mb-4 uppercase text-xs">🧪 Test & Validasi OTP</h2>
                <input type="text" id="target-wa" class="inp" placeholder="628xxxx (No WA)">
                <button onclick="requestOTP()" id="btn-send" class="btn bg-white mb-4">1. Kirim OTP</button>
                
                <input type="text" id="otp-val" class="inp" placeholder="Masukkan Kode dari WA">
                <button onclick="verifyOTP()" id="btn-ver" class="btn bg-yellow-400">2. Cek Validitas</button>
                <div id="res-val" class="mt-4 text-center font-bold">---</div>
            </div>

            <div class="card">
                <h2 class="font-bold mb-4 uppercase text-xs">📑 API Documentation</h2>
                <p class="text-[10px] mb-2 opacity-70">Gunakan endpoint ini di kodinganmu:</p>
                <p class="text-[9px] font-bold text-cyan-400">REQUEST OTP (POST):</p>
                <pre>/api/request-otp</pre>
                <p class="text-[9px] font-bold text-cyan-400 mt-2">VERIFIKASI (POST):</p>
                <pre>/api/verify-otp</pre>
            </div>
        </div>
    </div>

    <script>
        let userData = {};

        async function handleLogin() {
            const u = document.getElementById('u').value;
            const p = document.getElementById('p').value;
            const res = await fetch('/api/auth', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({u, p}) });
            const data = await res.json();
            if(data.status) {
                userData = data.data;
                document.getElementById('view-key').value = userData.apikey;
                document.getElementById('view-bal').innerText = userData.balance;
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('dash-screen').classList.remove('hidden');
            } else alert(data.msg);
        }

        async function requestOTP() {
            const target = document.getElementById('target-wa').value;
            if(!target) return alert("Isi nomor WA!");
            const res = await fetch('/api/request-otp', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ apikey: userData.apikey, target })
            });
            const data = await res.json();
            if(data.status) alert("Termux akan mengirim WA!");
        }

        async function verifyOTP() {
            const code = document.getElementById('otp-val').value;
            const res = await fetch('/api/verify-otp', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ code_input: code })
            });
            const data = await res.json();
            const resDiv = document.getElementById('res-val');
            resDiv.innerText = data.msg;
            resDiv.style.color = data.status ? "#00ff00" : "#ff0000";
        }
    </script>
</body>
</html>
