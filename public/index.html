<!DOCTYPE html>
<html>
<head>
    <title>OTP Publisher Dash</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; padding: 20px; }
        .box { border: 4px solid #0f0; padding: 20px; box-shadow: 10px 10px 0px #0f0; max-width: 400px; margin: auto; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 2px solid #0f0; background: #000; color: #0f0; }
        button { background: #0f0; color: #000; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box" id="loginBox">
        <h2>LOGIN PUBLISHER</h2>
        <input type="text" id="user" placeholder="Username">
        <input type="password" id="pass" placeholder="Password">
        <button onclick="login()">ENTER</button>
    </div>

    <div class="box" id="dashBox" style="display:none;">
        <h2>SEND OTP</h2>
        <input type="text" id="target" placeholder="628xxxx">
        <input type="text" id="otp" placeholder="Kode OTP">
        <input type="text" id="termux" placeholder="URL Ngrok Termux">
        <button onclick="send()">SEND VIA WHATSAPP</button>
    </div>

    <script>
        async function login() {
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: user.value, password: pass.value})
            });
            const data = await res.json();
            if(data.success) {
                loginBox.style.display = 'none';
                dashBox.style.display = 'block';
            } else { alert("Gagal!"); }
        }

        async function send() {
            const res = await fetch('/api/send-otp', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({number: target.value, otp: otp.value, termux_url: termux.value})
            });
            const data = await res.json();
            alert(data.status ? "Terkirim!" : "Gagal!");
        }
    </script>
</body>
</html>
